async function registrarTokenPush(){
  if(!messaging||!CU)return;
  try{
    // Detecta o caminho base automaticamente
    const swPath=location.pathname.replace(/\/[^/]*$/, "/")+"/firebase-messaging-sw.js";
    const sw=await navigator.serviceWorker.register(swPath);
    const perm=await Notification.requestPermission();

    const token=await getToken(messaging,{vapidKey:VAPID_KEY,serviceWorkerRegistration:sw});

      await setDoc(doc(db,"usuarios",CU.uid),{fcmToken:token},{merge:true});
      onMessage(messaging,payload=>{
        const {title,body}=payload.notification||{};
        showToast((title?title+": ":"")+body,false);
      });
    }
  }catch(e){console.warn("Push não disponível:",e.message);}
}

function precoPorEstado(estado){
  const pSC=PRECOS_GAS["SC"]||6.20;

}

function calcRota(distIda,auto,tanque,estado,pedIda,gasManual){
  const gas=gasManual||precoPorEstado(estado||"SC");
  const dt=distIda*2,lit=dt/auto,comb=lit*gas;
  const ped=pedIda!=null?pedIda*2:0;
  const alcance=tanque*auto,precisa=distIda>alcance;
  const paradas=precisa?Math.ceil((dt-alcance)/alcance):0;
  return{dt,lit,comb,ped,total:comb+ped,precisa,paradas,gas,pedReal:pedIda!=null};
}

function showToast(msg,err=false){
  const t=document.getElementById("toast");
  const m=document.getElementById("toast-msg");
  const b=document.getElementById("toast-bar");
  const ic=err?"❌ ":"✅ ";
  if(m)m.textContent=ic+msg;
  if(b){b.style.background=err?"var(--danger)":"var(--green)";b.style.animation="none";b.offsetHeight;b.style.animation="toastBar 2.5s linear forwards";}
  t.className="toast"+(err?" err":"")+" show";
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.classList.remove("show"),2500);
}

async function uploadFoto(file){
  const fd=new FormData();
  fd.append("file",file);fd.append("upload_preset",PRESET);fd.append("folder","mutantes-mc");
  const r=await fetch("https://api.cloudinary.com/v1_1/"+CLOUD+"/image/upload",{method:"POST",body:fd});

  if(!d.secure_url)throw new Error("Falha no upload");
  return d.secure_url;
}

function atualizarIconePWA(url){
  if(!url)return;
  document.getElementById("apple-touch-icon").href=url;
  const origin=window.location.origin+window.location.pathname.replace(/\/[^/]*$/,"/");
  const manifest={name:"Mutantes MC Itajaí",short_name:"Mutantes MC",start_url:origin,display:"standalone",background_color:"#0f0f0f",theme_color:"#e8670a",icons:[{src:url,sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:url,sizes:"512x512",type:"image/png"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
  const old=document.getElementById("pwa-manifest");
  if(old._blobUrl)URL.revokeObjectURL(old._blobUrl);
  const blobUrl=URL.createObjectURL(blob);
  old._blobUrl=blobUrl;
  old.href=blobUrl;
}

function proxQuarta(){
  const hoje=new Date();
  const dia=hoje.getDay();
  const diff=dia<=3?3-dia:7-(dia-3);
  const q=new Date(hoje);
  q.setDate(hoje.getDate()+(diff===0&&dia===3?0:diff===0?7:diff));
  if(dia===3)q.setDate(hoje.getDate());
  return q.toISOString().slice(0,10);
}

function htmlBnav(tabs){

}

function proxSexta(){
  const hoje=new Date();
  const dia=hoje.getDay();// 0=dom,5=sex
  const diff=dia<=5?5-dia:6+5-dia+1;
  const sx=new Date(hoje);
  sx.setDate(hoje.getDate()+(diff===0&&dia===5?0:diff===0?7:diff));
  // Se hoje é sexta, usa hoje
  if(dia===5)sx.setDate(hoje.getDate());
  return sx.toISOString().slice(0,10);
}

async function carregarSedeInfo(){
  const abaSede=window._sedeAba||"presenca";
  const isLimpeza=abaSede==="limpeza";
  const data=isLimpeza?proxQuarta():proxSexta();
  const tipo=isLimpeza?"limpeza":"presenca";
  try{
    const snap=await getDocs(query(collection(db,"sede_confirmacoes"),where("data","==",data),where("tipo","==",tipo)));
    const todos=snap.docs.map(d=>d.data());
    const vao=todos.filter(p=>p.resposta==="sim").sort((a,b)=>a.apelido.localeCompare(b.apelido));
    const nao=todos.filter(p=>p.resposta==="nao").sort((a,b)=>a.apelido.localeCompare(b.apelido));
    const responderam=new Set(todos.map(p=>p.membroId));
    const semResposta=MEMBROS.filter(m=>!responderam.has(m.uid)).sort((a,b)=>a.apelido.localeCompare(b.apelido));
    const el=document.getElementById("sede-lista");
    if(el)el.innerHTML=`
      <div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">✅ ${isLimpeza?"Vão limpar":"Confirmados"} (${vao.length})</div>
        ${vao.length===0?`<div style="font-size:12px;color:#555;padding:4px 0">Nenhuma confirmação ainda</div>`
          :vao.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
            ${avatarEl(MEMBROS.find(m=>m.uid===p.membroId)?.fotoUrl||"",p.apelido,26)}
            <span style="font-size:13px;font-weight:500">${p.apelido}</span>
          </div>`).join("")}
      </div>
      ${nao.length>0?`<div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:600;color:var(--danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">❌ Não vão (${nao.length})</div>
        ${nao.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
          ${avatarEl(MEMBROS.find(m=>m.uid===p.membroId)?.fotoUrl||"",p.apelido,26)}
          <span style="font-size:13px;color:var(--muted)">${p.apelido}</span>
        </div>`).join("")}
      </div>`:""}
      ${semResposta.length>0?`<div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">⏳ Sem resposta (${semResposta.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${semResposta.map(m=>`<span style="font-size:11px;color:var(--muted);background:var(--bg3);padding:2px 7px;border-radius:20px;border:1px solid var(--border)">${m.apelido}</span>`).join("")}</div>
      </div>`:""}`;
  }catch(e){console.error(e);}
  if(!isLimpeza){
    try{
      const [snapBar,snapChur]=await Promise.all([
        getDocs(query(collection(db,"escala_bar"),where("data","==",proxSexta()))),
        getDocs(query(collection(db,"escala_churrasco"),where("data","==",proxSexta())))
      ]);
      const el=document.getElementById("escala-hoje");
      if(el){
        const bar=snapBar.empty?null:snapBar.docs[0].data();
        const chur=snapChur.empty?null:snapChur.docs[0].data();
        if(!bar&&!chur){el.innerHTML=`<span style="font-size:12px;color:#555">Escalas não definidas ainda.</span>`;return;}
        el.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap">
          ${bar?`<div style="flex:1;min-width:110px;background:var(--bg3);border-radius:8px;padding:8px 10px;border:1px solid rgba(232,103,10,.2)">
            <div style="font-size:10px;font-weight:600;color:var(--orange);margin-bottom:3px">🍺 BAR</div>
            <div style="font-size:12px;font-weight:600">${bar.m1} & ${bar.m2}</div>
            ${bar.obs?`<div style="font-size:10px;color:var(--muted)">📝 ${bar.obs}</div>`:""}
          </div>`:""}
          ${chur?`<div style="flex:1;min-width:110px;background:var(--bg3);border-radius:8px;padding:8px 10px;border:1px solid rgba(76,175,125,.2)">
            <div style="font-size:10px;font-weight:600;color:var(--green);margin-bottom:3px">🔥 CHURRASCO</div>
            <div style="font-size:12px;font-weight:600">${[chur.m1,chur.m2,chur.m3,chur.m4,chur.m5].filter(Boolean).join(" · ")}</div>
            ${chur.obs?`<div style="font-size:10px;color:var(--muted)">📝 ${chur.obs}</div>`:""}
          </div>`:""}
        </div>`;
      }
    }catch{}
  }
}

async function carregarEscalaLista(){
  try{
    const canEdit=UP&&(UP.isAdmin||UP.isBarman||UP.isDiretor);
    const abaBar=window._barAba||"bar";
    const col=abaBar==="churrasco"?"escala_churrasco":"escala_bar";
    const snap=await getDocs(query(collection(db,col),orderBy("data","asc")));
    const el=document.getElementById("escala-lista");
    if(!el)return;
    const hoje=new Date().toISOString().slice(0,10);
    const docs=snap.docs.map(d=>({id:d.id,...d.data()})).filter(e=>e.data>=hoje);
    el.innerHTML=docs.length===0?`<span style="font-size:12px;color:#555">Nenhuma escala cadastrada.</span>`:
      docs.map(e=>{
        const nomes=abaBar==="churrasco"
          ?[e.m1,e.m2,e.m3,e.m4,e.m5].filter(Boolean).join(" · ")
          :`${e.m1} & ${e.m2}`;
        return`<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${fmtDate(e.data)}</div>
            <div style="font-size:12px;color:${abaBar==="churrasco"?"var(--green)":"var(--orange)"}">
              ${abaBar==="churrasco"?"🔥":"🍺"} ${nomes}
            </div>
            ${e.obs?`<div style="font-size:11px;color:var(--muted)">📝 ${e.obs}</div>`:""}
          </div>
          ${canEdit?`<button onclick="window.excluirEscala('${e.id}','${col}')" class="btn-danger">✕</button>`:""}
        </div>`;
      }).join("");
  }catch(e){console.error(e);}
}

    {ic:"🗓️",lb:"Sede desta sexta",msg:`🏍️ *MUTANTES MC ITAJAÍ*%0A%0A⛪ Sede aberta esta sexta, ${fmtDate(dataSex)}!%0AConfirme sua presença no app 👇%0Ahttps://muyanepetters-alt.github.io/mutantefy`},

      <a href="https://wa.me/?text=${m.msg}" target="_blank" style="padding:8px 14px;border-radius:8px;background:#25d366;color:#fff;font-size:12px;font-weight:700;text-decoration:none;flex-shrink:0">Enviar</a>

function htmlPlacaHonra(){

  const proximos=MEMBROS.filter(m=>(m.totalKm||0)<META&&(m.totalKm||0)>=(META*0.7)).sort((a,b)=>(b.totalKm||0)-(a.totalKm||0));
  return`<div class="card" style="border-color:rgba(232,103,10,.4);background:rgba(232,103,10,.04)">

          ${avatarEl(m.fotoUrl,m.apelido,40)}
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700">${m.apelido}</div>

          </div>
          <div style="font-size:20px">🏆</div>
        </div>`).join("")}
  </div>
  ${proximos.length>0?`<div class="card">
    <div class="sec-title">🔥 Quase lá — acima de 70%</div>
    ${proximos.map(m=>{
      const p=Math.round(((m.totalKm||0)/META)*100);
      return`<div style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          ${avatarEl(m.fotoUrl,m.apelido,28)}

      </div>`;
    }).join("")}
  </div>`:""}`;

async function carregarVotacoes(){
  const el=document.getElementById("vot-admin-lista");
  if(!el)return;
  try{
    const snap=await getDocs(query(collection(db,"votacoes"),orderBy("criadoEm","desc")));
    if(snap.empty){el.innerHTML=`<div style="font-size:12px;color:#555">Nenhuma enquete ainda.</div>`;return;}
    el.innerHTML=snap.docs.map(d=>{
      const v=d.data();

let _evView="lista";
let _calMes=new Date().getMonth();
let _calAno=new Date().getFullYear();

window.setEvView=(view)=>{
  _evView=view;
  const lista=document.getElementById("ev-lista-wrap");
  const cal=document.getElementById("ev-cal-wrap");
  const btnL=document.getElementById("ev-view-lista");

  if(btnC){btnC.style.background=view==="cal"?"var(--orange)":"var(--bg3)";btnC.style.color=view==="cal"?"#fff":"var(--muted)";btnC.style.border=view==="cal"?"none":"1px solid var(--border)";}
  if(view==="cal")renderCalendario();
};

function renderCalendario(){
  const cal=document.getElementById("ev-cal-wrap");
  if(!cal)return;
  const hoje=new Date();
  const ano=_calAno, mes=_calMes;
  const primeiroDia=new Date(ano,mes,1).getDay(); // 0=dom
  const diasNoMes=new Date(ano,mes+1,0).getDate();
  const meses=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const dias=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  // Mapear eventos do mês
  const eventosPorDia={};
  EVENTOS.forEach(ev=>{
    const d=new Date(ev.data+"T00:00:00");
    if(d.getMonth()===mes&&d.getFullYear()===ano){
      const dia=d.getDate();
      if(!eventosPorDia[dia])eventosPorDia[dia]=[];
      eventosPorDia[dia].push(ev);
    }
  });

  // Células do calendário
  let cells="";
  // Dias da semana header
  cells+=dias.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;text-transform:uppercase">${d}</div>`).join("");

  // Células vazias antes do primeiro dia
  for(let i=0;i<primeiroDia;i++) cells+=`<div></div>`;

  // Dias do mês
  for(let dia=1;dia<=diasNoMes;dia++){
    const ehHoje=hoje.getDate()===dia&&hoje.getMonth()===mes&&hoje.getFullYear()===ano;
    const evs=eventosPorDia[dia]||[];
    const temEv=evs.length>0;
    cells+=`<div onclick="${temEv?`window.verEvDia(${dia},${mes},${ano})`:"return false"}"
      style="min-height:44px;border-radius:8px;padding:4px;cursor:${temEv?"pointer":"default"};
      background:${ehHoje?"rgba(232,103,10,.2)":temEv?"rgba(232,103,10,.08)":"transparent"};
      border:1px solid ${ehHoje?"var(--orange)":temEv?"rgba(232,103,10,.3)":"transparent"};
      position:relative;transition:background .15s">
      <div style="font-size:12px;font-weight:${ehHoje?"700":"400"};color:${ehHoje?"var(--orange)":"var(--white)"};text-align:center">${dia}</div>
      ${temEv?`<div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:2px">${evs.map(()=>`<div style="width:6px;height:6px;border-radius:50%;background:var(--orange)"></div>`).join("")}</div>`:""}
    </div>`;
  }

  // Detalhe do evento selecionado
  cal.innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <button onclick="window.navCal(-1)" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--white);font-size:16px;cursor:pointer;font-family:inherit">‹</button>
        <div style="font-size:15px;font-weight:700">${meses[mes]} ${ano}</div>
        <button onclick="window.navCal(1)" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--white);font-size:16px;cursor:pointer;font-family:inherit">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${cells}
      </div>
      ${Object.keys(eventosPorDia).length===0?`<div style="font-size:12px;color:#555;text-align:center;margin-top:14px">Nenhum evento neste mês</div>`:""}
    </div>
    <div id="ev-cal-detalhe"></div>`;
}

window.navCal=(dir)=>{
  _calMes+=dir;
  if(_calMes>11){_calMes=0;_calAno++;}
  if(_calMes<0){_calMes=11;_calAno--;}
  renderCalendario();
};

window.verEvDia=(dia,mes,ano)=>{
  const evs=EVENTOS.filter(ev=>{
    const d=new Date(ev.data+"T00:00:00");
    return d.getDate()===dia&&d.getMonth()===mes&&d.getFullYear()===ano;
  });
  const det=document.getElementById("ev-cal-detalhe");
  if(!det)return;
  det.innerHTML=evs.map(ev=>evCardMembro(ev)).join("");
  det.scrollIntoView({behavior:"smooth",block:"nearest"});
};

async function carregarGaleria(eventoId){
  const el=document.getElementById("galeria-grid");
  if(!el)return;
  el.innerHTML=`<span class="spin">⟳</span>`;
  try{
    const snap=await getDocs(query(collection(db,"galeria"),orderBy("criadoEm","desc")));
    const fotos=snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(f=>!eventoId||(eventoId==="geral"?(!f.eventoId||f.eventoId==="geral"):f.eventoId===eventoId));
    if(fotos.length===0){el.innerHTML=`<div style="grid-column:1/-1;font-size:12px;color:#555;padding:10px 0">Nenhuma foto ainda. Seja o primeiro a postar!</div>`;return;}
    el.innerHTML=fotos.map(f=>`<div style="position:relative;aspect-ratio:1;overflow:hidden;border-radius:8px;cursor:pointer" onclick="window.open('${f.url}','_blank')">
      <img src="${f.url}" style="width:100%;height:100%;object-fit:cover" loading="lazy"/>
      ${UP&&(UP.isAdmin||f.autorId===CU.uid)?`<button onclick="event.stopPropagation();window.excluirFotoGaleria('${f.id}')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer">✕</button>`:""}
    </div>`).join("");
  }catch(e){el.innerHTML=`<div style="font-size:12px;color:var(--danger)">Erro ao carregar.</div>`;}
}

window.filtrarGaleria=()=>{
  const val=document.getElementById("galeria-filtro-evento")?.value;

window.uploadFotosGaleria=async(input)=>{
  const files=Array.from(input.files);
  if(!files.length)return;
  const eventoId=document.getElementById("galeria-filtro-evento")?.value||"geral";
  showToast(`Enviando ${files.length} foto(s)...`);

function htmlAniversarios(){
  const hoje=new Date();
  const mesAtual=hoje.getMonth()+1;
  const diaAtual=hoje.getDate();
  const comAniversario=MEMBROS.filter(m=>m.nascimento).map(m=>{
    const [ano,mes,dia]=m.nascimento.split("-").map(Number);
    const idade=hoje.getFullYear()-ano-(mes>mesAtual||(mes===mesAtual&&dia>diaAtual)?1:0);
    return{...m,mes,dia,idade};
  }).sort((a,b)=>a.mes!==b.mes?a.mes-b.mes:a.dia-b.dia);
  const doMes=comAniversario.filter(m=>m.mes===mesAtual);
  const outros=comAniversario.filter(m=>m.mes!==mesAtual);
  const meses=["","Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const isHoje=(m)=>m.mes===mesAtual&&m.dia===diaAtual;
  const renderCard=(m)=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">

  return`<div class="card" style="${doMes.length>0?"border-color:rgba(232,103,10,.3)":""}">
    <div class="sec-title">🎂 ${meses[mesAtual]} — ${doMes.length} aniversariante${doMes.length!==1?"s":""}</div>
    ${doMes.length===0?`<div style="font-size:12px;color:#555">Nenhum aniversariante este mês.</div>`:doMes.map(renderCard).join("")}

  ${outros.length>0?`<div class="card">
    <div class="sec-title">📅 Próximos meses</div>

async function carregarMensalidades(){
  const wrap=document.getElementById("mensalidades-wrap");
  if(!wrap)return;
  const hoje=new Date();
  const mesAtual=`${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,"0")}`;
  const meses=[];
  for(let i=0;i<6;i++){
    const d=new Date(hoje.getFullYear(),hoje.getMonth()-i,1);
    meses.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
  }
  try{
    const snap=await getDocs(collection(db,"mensalidades"));
    const pagtos={};
    snap.docs.forEach(d=>{const r=d.data();const k=r.membroId+"_"+r.mes;pagtos[k]={id:d.id,...r};});
    const mesLabel=(m)=>{const [y,mo]=m.split("-");const nomes=["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];return`${nomes[parseInt(mo)]}/${y.slice(2)}`;};
    wrap.innerHTML=`<div class="card">
      <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px;margin-bottom:14px">
        ${meses.map(m=>`<button onclick="window._mesAtual='${m}';carregarMensalidades()" style="flex-shrink:0;padding:6px 14px;border-radius:20px;border:${(window._mesAtual||mesAtual)===m?"none":"1px solid var(--border)"};background:${(window._mesAtual||mesAtual)===m?"var(--orange)":"var(--bg3)"};color:${(window._mesAtual||mesAtual)===m?"#fff":"var(--muted)"};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">${mesLabel(m)}</button>`).join("")}
      </div>
      ${(()=>{
        const mes=window._mesAtual||mesAtual;
        const pagos=MEMBROS.filter(m=>pagtos[m.uid+"_"+mes]?.pago);
        const nao=MEMBROS.filter(m=>!pagtos[m.uid+"_"+mes]?.pago);
        return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
          <div class="metric" style="padding:12px"><div class="metric-label">✅ Pagos</div><div class="metric-value" style="color:var(--green)">${pagos.length}</div></div>
          <div class="metric" style="padding:12px"><div class="metric-label">❌ Pendentes</div><div class="metric-value" style="color:var(--danger)">${nao.length}</div></div>
        </div>
        ${MEMBROS.map(m=>{
          const k=m.uid+"_"+mes;
          const p=pagtos[k];
          return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            ${avatarEl(m.fotoUrl,m.apelido,32)}
            <div style="flex:1"><div style="font-size:13px;font-weight:600">${m.apelido}</div>${p?.pago&&p?.data?`<div style="font-size:10px;color:var(--muted)">${fmtDate(p.data)}</div>`:""}</div>
            <button onclick="window.toggleMensalidade('${m.uid}','${m.apelido}','${mes}','${p?.id||""}')" style="padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:none;background:${p?.pago?"#2a6e3f":"var(--bg3)"};color:${p?.pago?"#fff":"var(--muted)"};">${p?.pago?"✅ Pago":"Marcar"}</button>
          </div>`;
        }).join("")}`;
      })()}
    </div>`;
  }catch(e){console.error(e);wrap.innerHTML=`<div style="font-size:12px;color:var(--danger)">Erro.</div>`;}
}

window.toggleMensalidade=async(uid,apelido,mes,docId)=>{
  try{
    if(docId){
      const snap=await getDoc(doc(db,"mensalidades",docId));
      const pago=snap.data()?.pago;
      await setDoc(doc(db,"mensalidades",docId),{pago:!pago,data:!pago?new Date().toISOString().slice(0,10):""},{merge:true});
    }else{
      await addDoc(collection(db,"mensalidades"),{membroId:uid,apelido,mes,pago:true,data:new Date().toISOString().slice(0,10),criadoPor:UP.apelido,criadoEm:serverTimestamp()});
    }
    carregarMensalidades();
  }catch{showToast("Erro.",true);}
};

  </div>`:""}
  <div class="card">
    <div class="sec-title">🎉 Próximos eventos na sede</div>
    <div id="eventos-sede-lista"><span class="spin">⟳</span></div>
  </div>`;
}

async function carregarEventosSede(){
  const el=document.getElementById("eventos-sede-lista");
  if(!el)return;
  try{
    const hoje=new Date().toISOString().slice(0,10);
    const snap=await getDocs(query(collection(db,"eventos_sede"),orderBy("data","asc")));
    const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
    const futuros=docs.filter(e=>e.data>=hoje);
    const passados=docs.filter(e=>e.data<hoje).slice(-3).reverse();
    if(docs.length===0){el.innerHTML=`<div style="font-size:12px;color:#555">Nenhum evento cadastrado.</div>`;return;}
    const isAdmin=UP&&(UP.isAdmin||UP.isDiretor);
    const renderEv=(e,passado=false)=>{
      const hoje2=new Date();hoje2.setHours(0,0,0,0);
      const evData=new Date(e.data+"T00:00:00");
      const dias=Math.round((evData-hoje2)/(1000*60*60*24));
      const diasLabel=dias===0?"🔴 Hoje!":dias===1?"🟠 Amanhã":dias>0?`🕐 ${dias} dias`:"";
      return`<div style="padding:12px 0;border-bottom:1px solid var(--border);opacity:${passado?".6":"1"}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div style="font-size:14px;font-weight:700">${e.nome}</div>
            <div style="font-size:12px;color:var(--muted)">${fmtDate(e.data)}${e.hora?` · ${e.hora}`:""}</div>
            ${e.desc?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${e.desc}</div>`:""}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            ${diasLabel?`<span style="font-size:10px;font-weight:700;color:${dias===0?"var(--danger)":dias<=7?"var(--orange)":"var(--muted)"};background:${dias===0?"rgba(224,82,82,.15)":dias<=7?"rgba(232,103,10,.15)":"var(--bg3)"};padding:2px 8px;border-radius:20px;border:1px solid ${dias===0?"rgba(224,82,82,.3)":dias<=7?"rgba(232,103,10,.3)":"var(--border)"}">${diasLabel}</span>`:""}
            ${isAdmin?`<button onclick="window.excluirEventoSede('${e.id}')" style="font-size:10px;color:var(--danger);background:transparent;border:none;cursor:pointer">✕</button>`:""}
          </div>
        </div>
      </div>`;
    };
    el.innerHTML=(futuros.length===0?`<div style="font-size:12px;color:#555;margin-bottom:10px">Nenhum evento futuro.</div>`:"")
      +futuros.map(e=>renderEv(e)).join("")
      +(passados.length>0?`<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-top:12px;margin-bottom:6px">Passados</div>`+passados.map(e=>renderEv(e,true)).join(""):"");
  }catch(e){el.innerHTML=`<div style="font-size:12px;color:var(--danger)">Erro.</div>`;}
}

window.salvarEventoSede=async()=>{
  const nome=document.getElementById("es-nome")?.value.trim();
  const data=document.getElementById("es-data")?.value;
  const hora=document.getElementById("es-hora")?.value;
  const desc=document.getElementById("es-desc")?.value.trim();
  if(!nome||!data){showToast("Preencha nome e data.",true);return;}
  try{
    await addDoc(collection(db,"eventos_sede"),{nome,data,hora:hora||"",desc:desc||"",criadoPor:UP.apelido,criadoEm:serverTimestamp()});
    document.getElementById("es-nome").value="";document.getElementById("es-desc").value="";
    showToast("✓ Evento publicado!");carregarEventosSede();
  }catch{showToast("Erro.",true);}
};

window.excluirEventoSede=async(id)=>{
  if(!confirm("Excluir este evento?"))return;
  try{await deleteDoc(doc(db,"eventos_sede",id));showToast("Excluído.");carregarEventosSede();}catch{showToast("Erro.",true);}
};

window.trocarAbaReuniao=(aba)=>{
  ["proxima","agendar","historico"].forEach(a=>{
    const btn=document.getElementById("reun-tab-"+a);
    if(!btn)return;
    const active=a===aba;
    btn.style.background=active?"var(--orange)":"var(--bg3)";
    btn.style.color=active?"#fff":"var(--muted)";

  });

window.recalcTotal=(evId)=>{

  const ped=parseFloat(pedEl.value.replace(",","."))||0;

window.atualizarHistorico=async(tipo)=>{
  const el=document.getElementById("hist-conteudo-"+tipo);
  if(!el)return;
  const aberto=window["_hist_"+tipo];
  el.style.display=aberto?"block":"none";
  if(!aberto)return;
  el.innerHTML=`<span class="spin">⟳</span>`;
  try{
    if(tipo==="presenca"||tipo==="limpeza"){
      // Últimas 8 sextas (presenca) ou quartas (limpeza)
      const datas=[];
      const hoje=new Date();
      let d=new Date(hoje);
      const divoSemana=tipo==="limpeza"?3:5;
      const diasAtras=(hoje.getDay()>=divoSemana)?hoje.getDay()-divoSemana:7-(divoSemana-hoje.getDay());
      d.setDate(d.getDate()-diasAtras);
      for(let i=0;i<8;i++){datas.push(d.toISOString().slice(0,10));d.setDate(d.getDate()-7);}
      const snap=await getDocs(query(collection(db,"sede_confirmacoes"),where("data","in",datas),where("tipo","==",tipo)));
      const porData={};
      snap.docs.forEach(doc=>{const r=doc.data();if(!porData[r.data])porData[r.data]={sim:[],nao:[]};porData[r.data][r.resposta].push(r.apelido);});
      const html=datas.filter(s=>porData[s]).map(s=>{
        const v=porData[s].sim||[],n=porData[s].nao||[];
        return`<div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <div style="font-size:13px;font-weight:600">${fmtDate(s)}</div>
            <div style="font-size:11px;color:var(--muted)">✅ ${v.length} · ❌ ${n.length}</div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:3px">
            ${v.map(a=>`<span class="pres-badge pres-sim" style="font-size:10px;padding:2px 7px">${a}</span>`).join("")}
            ${n.map(a=>`<span class="pres-badge pres-nao" style="font-size:10px;padding:2px 7px">${a}</span>`).join("")}
          </div>
        </div>`;
      }).join("");
      el.innerHTML=html||`<div style="font-size:12px;color:#555;padding:8px 0">Nenhum histórico.</div>`;
    }else{
      // Bar ou Churrasco — últimas 8 semanas
      const col=tipo==="bar"?"escala_bar":"escala_churrasco";
      const hoje=new Date().toISOString().slice(0,10);
      const snap=await getDocs(query(collection(db,col),orderBy("data","desc")));
      const docs=snap.docs.filter(d=>d.data().data<hoje).slice(0,8);
      const html=docs.map(d=>{
        const e=d.data();
        const nomes=tipo==="bar"?`${e.m1} & ${e.m2}`:[e.m1,e.m2,e.m3,e.m4,e.m5].filter(Boolean).join(" · ");
        return`<div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:13px;font-weight:600">${fmtDate(e.data)}</div>
          <div style="font-size:12px;color:${tipo==="bar"?"var(--orange)":"var(--green)"}">${tipo==="bar"?"🍺":"🔥"} ${nomes}</div>
          ${e.obs?`<div style="font-size:11px;color:var(--muted)">📝 ${e.obs}</div>`:""}
        </div>`;
      }).join("");
      el.innerHTML=html||`<div style="font-size:12px;color:#555;padding:8px 0">Nenhum histórico.</div>`;
    }
  }catch(e){el.innerHTML=`<div style="font-size:12px;color:var(--danger)">Erro ao carregar.</div>`;}
};

window.filtrarMembros=(texto)=>{
  const q=texto.toLowerCase().trim();
  document.querySelectorAll(".membro-item").forEach(el=>{
    const apelido=el.dataset.apelido||"";
    el.style.display=(!q||apelido.includes(q))?"block":"none";
  });
};

window.registrarComparecimento=async(membroId,apelido,eventoId)=>{
  const ev=EVENTOS.find(e=>e.id===eventoId);
  if(!ev)return;
  const btnId="btn-comp-"+membroId+"-"+eventoId;
  const btn=document.getElementById(btnId);
  if(btn){btn.disabled=true;btn.textContent="Lançando...";}
  let km=ev.dist>0?ev.dist*2:parseFloat(prompt("Distância total ida+volta (km) do evento "+ev.nome+":"));
  if(!km||isNaN(km)||km<=0){if(btn){btn.disabled=false;btn.textContent="🏁 Compareceu";}return;}
  const m=MEMBROS.find(m=>m.uid===membroId);
  try{
    const regRef=await addDoc(collection(db,"registros"),{membroId,apelido:apelido||m?.apelido||"",desc:ev.nome,data:ev.data,km,tipo:"rota",eventoId,createdAt:serverTimestamp()});
    const nt=(m?.totalKm||0)+km;
    await setDoc(doc(db,"usuarios",membroId),{totalKm:nt},{merge:true});
    if(m)m.totalKm=nt;
    await setDoc(doc(db,"presencas",membroId+"_"+eventoId),{compareceu:true,registroId:regRef.id,kmLancado:km},{merge:true});
    showToast("✓ "+toInt(km)+" km lançado para "+apelido+"!");
    await carregarPresencasAdmin();
    // Push para o membro
    const mToken=m?.fcmToken;
    if(mToken)dispararPush("🏁 Presença confirmada!",`${toInt(km)} km do evento ${ev.nome} foram lançados no seu perfil`,[mToken]);
    registrarLog("compareceu",`registrou comparecimento de ${apelido} — ${toInt(km)} km`,ev.nome);
  }catch(e){
    showToast("Erro ao lançar km.",true);
    const btnEl=document.getElementById(btnId);
    if(btnEl){btnEl.disabled=false;btnEl.textContent="🏁 Compareceu";}
  }
};
window.excluirComparecimento=async(membroId,apelido,eventoId,registroId,km)=>{
  if(!confirm("Excluir lançamento de "+toInt(km)+" km de "+apelido+"?"))return;
  const m=MEMBROS.find(m=>m.uid===membroId);
  try{
    if(registroId)await deleteDoc(doc(db,"registros",registroId));
    const nt=Math.max(0,(m?.totalKm||0)-km);
    await setDoc(doc(db,"usuarios",membroId),{totalKm:nt},{merge:true});
    if(m)m.totalKm=nt;
    await setDoc(doc(db,"presencas",membroId+"_"+eventoId),{compareceu:false,registroId:null,kmLancado:0},{merge:true});
    showToast("✓ Lançamento excluído.");
    await carregarPresencasAdmin();
  }catch(e){showToast("Erro ao excluir.",true);}
};
window.editarComparecimento=async(membroId,apelido,eventoId,registroId,kmAtual)=>{
  const novoKm=parseFloat(prompt("Novo valor de km para "+apelido+":",kmAtual));
  if(!novoKm||isNaN(novoKm)||novoKm<=0)return;
  const m=MEMBROS.find(m=>m.uid===membroId);
  try{
    if(registroId)await setDoc(doc(db,"registros",registroId),{km:novoKm},{merge:true});
    const diff=novoKm-kmAtual;
    const nt=Math.max(0,(m?.totalKm||0)+diff);
    await setDoc(doc(db,"usuarios",membroId),{totalKm:nt},{merge:true});
    if(m)m.totalKm=nt;
    await setDoc(doc(db,"presencas",membroId+"_"+eventoId),{kmLancado:novoKm},{merge:true});
    showToast("✓ Km atualizado para "+toInt(novoKm)+"!");
    await carregarPresencasAdmin();
  }catch(e){showToast("Erro ao editar.",true);}
};
window.limparDadosTeste=async()=>{
  if(!confirm("Limpar TODOS os dados de teste?\n\nIsso vai apagar:\n• Notificações\n• Presenças em eventos\n• Confirmações de sede\n• Registros de km de teste\n• Log de ações"))return;
  showToast("Limpando...");
  try{
    const [notifSnap,presSnap,sedeSnap,logSnap]=await Promise.all([
      getDocs(collection(db,"notificacoes")),
      getDocs(collection(db,"presencas")),
      getDocs(collection(db,"sede_confirmacoes")),
      getDocs(collection(db,"audit_log")),
    ]);
    for(const d of notifSnap.docs)await deleteDoc(doc(db,"notificacoes",d.id));
    for(const d of presSnap.docs)await deleteDoc(doc(db,"presencas",d.id));
    for(const d of sedeSnap.docs)await deleteDoc(doc(db,"sede_confirmacoes",d.id));
    for(const d of logSnap.docs)await deleteDoc(doc(db,"audit_log",d.id));
    // Zera km de todos que tiveram registros de teste
    const regSnap=await getDocs(collection(db,"registros"));
    for(const d of regSnap.docs){
      const r=d.data();
      const m=MEMBROS.find(m=>m.uid===r.membroId);
      if(m){const nt=Math.max(0,(m.totalKm||0)-r.km);await setDoc(doc(db,"usuarios",r.membroId),{totalKm:nt},{merge:true});m.totalKm=nt;}
      await deleteDoc(doc(db,"registros",d.id));
    }
    CONF_SEDE={};
    await carregarRegistros();
    showToast("✓ Tudo limpo!");render();
  }catch(e){showToast("Erro: "+e.message,true);}
};

async function carregarFicha(uid){
  const el=document.getElementById("ficha-conteudo-"+uid);
  if(!el)return;
  try{
    const snap=await getDocs(query(collection(db,"fichas"),where("membroId","==",uid)));
    const docs=[...snap.docs].sort((a,b)=>(b.data().criadoEm?.seconds||0)-(a.data().criadoEm?.seconds||0));    if(snap.empty){el.innerHTML=`<div style="font-size:12px;color:#555;padding:6px 0">Nenhuma anotação ainda.</div>`;return;}
    el.innerHTML=docs.map(d=>{
      const r=d.data();
      const ts=r.criadoEm?.toDate?r.criadoEm.toDate():new Date();
      const hora=ts.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
      return`<div style="padding:10px;border-radius:8px;background:var(--bg);border:1px solid var(--border);margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div style="font-size:11px;color:var(--muted)">${hora} · ${r.autorApelido||""}</div>
          <button onclick="window.excluirFichaObs('${d.id}','${uid}')" style="font-size:10px;color:var(--danger);background:transparent;border:none;cursor:pointer;padding:0">✕</button>
        </div>
        ${r.obs?`<div style="font-size:13px;white-space:pre-wrap">${r.obs}</div>`:""}
        ${r.anexoUrl?`<div style="margin-top:8px">
          ${r.anexoTipo&&r.anexoTipo.startsWith("image")?
            `<img src="${r.anexoUrl}" style="max-width:100%;border-radius:6px;cursor:pointer" onclick="window.open('${r.anexoUrl}','_blank')"/>`:
            `<a href="${r.anexoUrl}" target="_blank" style="display:flex;align-items:center;gap:6px;color:var(--orange);font-size:12px;text-decoration:none;padding:6px 10px;border:1px solid rgba(232,103,10,.3);border-radius:6px;background:rgba(232,103,10,.05)">📎 ${r.anexoNome||"Anexo"}</a>`}
        </div>`:""}
      </div>`;
    }).join("");
  }catch(e){el.innerHTML=`<div style="font-size:12px;color:var(--danger)">Erro ao carregar.</div>`;}
}

window.salvarFichaObs=async(uid,apelido)=>{
  const obs=document.getElementById("ficha-obs-"+uid)?.value.trim();
  const input=document.getElementById("ficha-arq-"+uid);
  const f=input?.files[0];
  if(!obs&&!f){showToast("Escreva algo ou anexe um arquivo.",true);return;}
  try{
    let anexoUrl="",anexoNome="",anexoTipo="";
    if(f){
      showToast("Enviando anexo...");
      anexoUrl=await uploadFoto(f);
      anexoNome=f.name;
      anexoTipo=f.type;
    }
    await addDoc(collection(db,"fichas"),{
      membroId:uid,membroApelido:apelido,
      obs,anexoUrl,anexoNome,anexoTipo,
      autorId:CU.uid,autorApelido:UP.apelido,
      criadoEm:serverTimestamp()
    });
    const obsEl=document.getElementById("ficha-obs-"+uid);
    if(obsEl)obsEl.value="";
    if(input)input.value="";
    const nome=document.getElementById("ficha-arq-nome-"+uid);
    if(nome)nome.textContent="";
    showToast("✓ Salvo!");
    await carregarFicha(uid);
  }catch(e){showToast("Erro: "+e.message,true);}
};

window.cadastrarEmLote=async()=>{
  const btn=document.getElementById("lote-btn");
  const prog=document.getElementById("lote-progress");
  const bar=document.getElementById("lote-bar");
  const status=document.getElementById("lote-status");
  const result=document.getElementById("lote-result");
  const adminPass=prompt("Confirme sua senha admin:");
  if(!adminPass)return;
  btn.disabled=true;prog.style.display="block";result.innerHTML="";
  const adminEmail=CU.email;
  const ok=[],erros=[];
  for(let i=0;i<LOTE.length;i++){
    const u=LOTE[i];
    status.textContent="Cadastrando "+u.apelido+"... ("+(i+1)+"/"+LOTE.length+")";
    bar.style.width=Math.round((i/LOTE.length)*100)+"%";
    try{
      const snap=await getDocs(query(collection(db,"usuarios"),where("apelido","==",u.apelido)));
      if(!snap.empty){ok.push(u.apelido+" (já existe)");continue;}
      const cred=await createUserWithEmailAndPassword(auth,u.email,u.senha);
      await setDoc(doc(db,"usuarios",cred.user.uid),{apelido:u.apelido,email:u.email,moto:"",isAdmin:false,totalKm:0,fotoUrl:"",createdAt:serverTimestamp()});
      await signInWithEmailAndPassword(auth,adminEmail,adminPass);
      ok.push(u.apelido);
    }catch(e){
      erros.push(u.apelido+" ("+e.code+")");
      try{await signInWithEmailAndPassword(auth,adminEmail,adminPass);}catch{}
    }
  }
  bar.style.width="100%";
  status.textContent="Concluído! ✓";
  result.innerHTML=`<div class="msg-ok">✅ `+ok.length+` cadastrados: `+ok.join(", ")+`</div>`+(erros.length>0?`<div class="msg-err" style="margin-top:8px">❌ Erros: `+erros.join(", ")+`</div>`:"");
  await carregarMembros();render();
  btn.disabled=false;
};

window.lancarKm=async()=>{
  const membroId=document.getElementById("km-membro")?.value;
  const tipo=document.getElementById("km-tipo")?.value;
  const data=document.getElementById("km-data")?.value;
  const km=parseFloat(document.getElementById("km-valor")?.value);
  const err=document.getElementById("km-err");
  const btn=document.getElementById("km-btn");
  let desc="",eventoId=null;
  if(tipo==="rota"){
    const sel=document.getElementById("km-evento");
    const opt=sel?.options[sel.selectedIndex];
    if(!opt?.value){err.textContent="Selecione um evento.";err.style.display="block";return;}
    desc=opt.dataset.nome||"";eventoId=parseInt(opt.value);
  }else{
    desc=document.getElementById("km-desc")?.value.trim();
    if(!desc){err.textContent="Informe a descrição.";err.style.display="block";return;}
  }
  if(!membroId||!data||!km){err.textContent="Preencha todos os campos.";err.style.display="block";return;}
  btn.disabled=true;btn.textContent="Lançando...";err.style.display="none";
  const m=MEMBROS.find(m=>m.uid===membroId);
  try{
    await addDoc(collection(db,"registros"),{membroId,apelido:m?.apelido||"",desc,data,km,tipo,eventoId,createdAt:serverTimestamp()});
    const nt=(m?.totalKm||0)+km;
    await setDoc(doc(db,"usuarios",membroId),{totalKm:nt},{merge:true});
    if(m)m.totalKm=nt;
    await carregarRegistros();
    showToast("✓ "+toInt(km)+" km lançado!");
    ["km-membro","km-evento","km-data","km-valor"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    const kd=document.getElementById("km-desc");if(kd)kd.value="";
    btn.disabled=false;btn.textContent="Lançar km";render();
    // Push para o membro
    const mToken=m?.fcmToken;
    if(mToken)dispararPush("🏍️ Km lançado!",`${toInt(km)} km registrados para você — ${desc}`,[mToken]);
    registrarLog("km_lancado",`lançou ${toInt(km)} km para ${m?.apelido||""}`,desc);
  }catch(e){err.textContent="Erro: "+e.message;err.style.display="block";btn.disabled=false;btn.textContent="Lançar km";}
};
window.salvarEdicao=async(id,membroId,kmAntigo)=>{
  const desc=document.getElementById("ed-desc-"+id)?.value.trim();
  const data=document.getElementById("ed-data-"+id)?.value;
  const km=parseFloat(document.getElementById("ed-km-"+id)?.value);
  if(!desc||!data||!km)return;
  try{
    await setDoc(doc(db,"registros",id),{desc,data,km},{merge:true});
    const diff=km-kmAntigo;
    if(diff!==0){const m=MEMBROS.find(m=>m.uid===membroId);if(m){const nt=Math.max(0,(m.totalKm||0)+diff);await setDoc(doc(db,"usuarios",membroId),{totalKm:nt},{merge:true});m.totalKm=nt;}}
    await carregarRegistros();showToast("✓ Atualizado!");
    registrarLog("km_editado",`editou lançamento para ${toInt(km)} km`,"");
    render();
  }catch{showToast("Erro ao salvar.",true);}
};

                :`<button id="btn-comp-${p.membroId}-${ev.id}" onclick="window.registrarComparecimento('${p.membroId}','${p.apelido}',${ev.id})" style="font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid var(--green);background:transparent;color:var(--green);cursor:pointer;font-family:inherit;font-weight:600">🏁 Comp.</button>`}
            </span>`).join("")}
            ${naoVao.map(p=>`<span class="pres-badge pres-nao">❌ ${p.apelido}</span>`).join("")}
          </div>
          <div style="font-size:10px;color:var(--muted)">✅ ${vao.length} · ❌ ${naoVao.length} · ⏳ ${semResp} sem resposta</div>`}
        </div>
      </div>`;
    }
    wrap.innerHTML=html||`<div style="font-size:13px;color:#555">Nenhum evento futuro.</div>`;
  }catch(e){console.error(e);wrap.innerHTML=`<div style="font-size:12px;color:var(--danger)">Erro ao carregar.</div>`;}
}
      
onAuthStateChanged(auth,async user=>{
  CU=user;TA="home";TM="painel";CONF={};
  if(!user){UP=null;REGS=[];MEMBROS=[];render();return;}
  document.getElementById("app").innerHTML=`<div class="loading"><span class="spin">⟳</span> Carregando...</div>`;
  try{
    const snap=await getDoc(doc(db,"usuarios",user.uid));
    UP=snap.exists()?{uid:user.uid,...snap.data()}:{uid:user.uid,apelido:"Admin",isAdmin:true};
    if(!snap.exists())await setDoc(doc(db,"usuarios",user.uid),{apelido:"Admin",email:user.email,isAdmin:true,totalKm:0});
    const logoSnap=await getDoc(doc(db,"config","logo"));
    if(logoSnap.exists()){const url=logoSnap.data().url;localStorage.setItem("mutantes_logo",url);atualizarIconePWA(url);UP.logoUrl=url;}
    if(UP.isAdmin||UP.isDiretor||UP.isBarman)await carregarMembros();
    await carregarRegistros();
    await carregarConfirmacoes();
    await carregarPedagiosCustom();
    await carregarEncontros();
    registrarTokenPush();
  }catch(e){console.error(e);}
  render();
});
</script>
</body>
</html>
